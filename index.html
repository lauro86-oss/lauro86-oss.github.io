<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos Rápidos</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f172a, #1e3a8a);
      --card-bg: rgba(255,255,255,0.09);
      --card-hover: rgba(255,255,255,0.20);
      --text: #e0f2fe;
      --accent: #60a5fa;
    }
    [data-theme="light"] {
      --bg: linear-gradient(135deg, #f8fafc, #e0f2fe);
      --card-bg: rgba(255,255,255,0.92);
      --card-hover: rgba(255,255,255,0.98);
      --text: #0f172a;
      --accent: #1e40af;
    }

    body {
      font-family: system-ui, -apple-system, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px 15px;
      min-height: 100vh;
    }

    .container { max-width: 1280px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 { margin: 0; font-size: 2.6em; font-weight: 700; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .card h3 {
      margin: 0 0 12px 0;
      font-size: 1.45em;
      color: var(--accent);
    }

    .link-item {
      padding: 8px 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05em;
    }

    .link-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .link-item a {
      color: var(--text);
      text-decoration: none;
      flex: 1;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      opacity: 0.7;
      font-size: 0.95em;
    }
  </style>
</head>
<body>

    </header>

    function getFaviconUrl(url) {
      try {
        const domain = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?sz=32&domain=${domain}`;
      } catch (e) { return ''; }
    }

    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      categories.forEach(category => {
        if (category.links.length === 0) return;

        let html = `<div class="card"><h3>${category.title}</h3>`;

        category.links.forEach(link => {
          const favicon = getFaviconUrl(link.url);
          html += `
            <div class="link-item">
              <a href="${link.url}" target="_blank" rel="noopener">
                <img src="${favicon}" alt="" onerror="this.style.display='none'">
                ${link.name}
              </a>
            </div>`;
        });

        html += `</div>`;
        grid.innerHTML += html;
      });

      document.getElementById('totalLinks').textContent = categories.reduce((acc, cat) => acc + cat.links.length, 0);
    }

    window.onload = () => {
      renderCards();
    };
  </script>
</body>
</html>
