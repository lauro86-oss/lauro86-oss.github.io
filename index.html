<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos Rápidos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      background: #f8f9fa;
      color: #333;
    }
    h1 { text-align: center; color: #2c3e50; }
    h2 { 
      margin-top: 40px; 
      padding-bottom: 10px;
      border-bottom: 2px solid #3498db;
      color: #2980b9;
    }
    ul { list-style: none; padding: 0; }
    li { margin: 12px 0; }
    a {
      color: #2980b9;
      text-decoration: none;
      font-size: 1.1em;
    }
    a:hover {
      text-decoration: underline;
      color: #1f5f8c;
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.9em;
      color: #777;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #1e1e1e;
        color: #ddd;
      }
      a { color: #5dade2; }
    }
  </style>
</head>
<body>
  <h1>⭐ Meus Favoritos Rápidos</h1>

  <h2>📧 Google & Comunicação</h2>
  <ul>
    <li><a href="https://mail.google.com">Gmail</a></li>
    <!-- adicione os outros links aqui -->
  </ul>

  <!-- Repita para as outras categorias: Armazenamento, Entretenimento, etc. -->

  <div class="footer">
    Meus Atalhos Rápidos • Hospedado no GitHub Pages
  </div>
</body>
</html>
