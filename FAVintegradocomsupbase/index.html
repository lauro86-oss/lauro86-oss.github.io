    // ===== FUNÇÕES UTILITÁRIAS =====
    function escapeHtml(text) {
      if (!text) return '';
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    function isValidUrl(string) {
      try { new URL(string); return true; } catch (_) { return false; }
    }

    function getFaviconUrl(url) {
      try {
        const domain = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
      } catch {
        return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233b82f6"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.borderLeftColor = type === 'error' ? '#ef4444' : type === 'success' ? '#22c55e' : '#3b82f6';
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ===== TEMA =====
    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('dark', isDark);
      document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function loadTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        isDark = true;
        document.body.classList.add('dark');
        document.getElementById('themeBtn').textContent = '☀️';
      }
    }

    // ===== INICIALIZAÇÃO =====
    function initializeData() {
      const local = localStorage.getItem('favorites_data');
      if (local) {
        try {
          const parsed = JSON.parse(local);
          if (parsed.categories && parsed.categories.length > 0) {
            data = parsed;
            return;
          }
        } catch (e) { console.warn('Erro ao carregar localStorage', e); }
      }
      data = JSON.parse(JSON.stringify(initialData));
      saveLocal();
    }

    function saveLocal() {
      localStorage.setItem('favorites_data', JSON.stringify(data));
    }

    async function loadFromSupabase() {
      if (!supabaseClient) return;
      try {
        const {  result, error } = await supabaseClient.from('favoritos').select('categories').limit(1).order('created_at', { ascending: false });
        if (error) throw error;
        if (result && result[0] && result[0].categories) {
          data = { categories: result[0].categories };
          saveLocal();
          render();
          showToast('✅ Dados sincronizados', 'success');
        }
      } catch (e) {
        console.warn('⚠️ Supabase offline:', e.message);
      }
    }

    async function saveToSupabase() {
      if (!supabaseClient) {
        saveLocal();
        return;
      }
      try {
        const { data: existing } = await supabaseClient.from('favoritos').select('id').limit(1);
        if (existing && existing.length > 0) {
          await supabaseClient.from('favoritos').update({ categories: data.categories }).eq('id', existing[0].id);
        } else {
          await supabaseClient.from('favoritos').insert([{ categories: data.categories }]);
        }
        saveLocal();
        showToast('✅ Salvo na nuvem', 'success');
      } catch (e) {
        console.warn('⚠️ Erro ao salvar:', e.message);
        saveLocal();
        showToast('💾 Salvo localmente', 'info');
      }
    }

    // ===== EXPORT HTML =====
    function exportHTML() {
      const htmlContent = document.documentElement.outerHTML;
      const blob = new Blob([htmlContent], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `favoritos-${new Date().toISOString().split('T')[0]}.html`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('📄 HTML exportado!', 'success');
    }

    // ===== RENDERIZAÇÃO =====
    function render() {
      const container = document.getElementById('categories');
      const emptyState = document.getElementById('emptyState');
      container.innerHTML = '';

      if (!data.categories || data.categories.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }
      emptyState.classList.add('hidden');

      data.categories.forEach((cat, catIndex) => {
        const card = document.createElement('div');
        card.className = 'category-card';
        card.innerHTML = `
          <div class="category-header">
            <h2 class="category-title">${escapeHtml(cat.name)}</h2>
            <span class="category-count">(${cat.links.length})</span>
          </div>
          <div id="links-${catIndex}" class="links-container" data-cat-index="${catIndex}"></div>
          <button onclick="addLink(${catIndex})" class="btn btn-primary btn-add">
            ➕ Adicionar Link
          </button>
        `;
        container.appendChild(card);

        const linksContainer = card.querySelector(`#links-${catIndex}`);
        renderLinks(cat.links, catIndex, linksContainer);
      });

      populateCategorySelect();
    }

    function renderLinks(links, catIndex, container) {
      container.innerHTML = '';
      
      links.forEach((link, linkIndex) => {
        const item = document.createElement('div');
        item.className = 'link-item';
        item.draggable = true;
        
        const faviconUrl = getFaviconUrl(link.url);
        
        item.innerHTML = `
          <div class="link-content">
            <img src="${faviconUrl}" alt="" class="link-icon" onerror="this.style.display='none'">
            <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="link-title" onclick="event.stopPropagation()">
              ${escapeHtml(link.title)}
            </a>
          </div>
          ${link.tags && link.tags.length ? `
            <div class="tags-container">
              ${link.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
          ` : '<div style="width: 60px;"></div>'}
          <div class="link-actions">
            <button class="action-btn" onclick="editLink(${catIndex}, ${linkIndex})" title="Editar">✏️</button>
            <button class="action-btn" onclick="deleteLink(${catIndex}, ${linkIndex})" title="Excluir">🗑️</button>
          </div>
        `;
        
        container.appendChild(item);
      });

      // Initialize SortableJS
      new Sortable(container, {
        group: 'links',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: async (evt) => {
          const fromCat = parseInt(evt.from.dataset.catIndex);
          const toCat = parseInt(evt.to.dataset.catIndex);
          
          const movedLink = data.categories[fromCat].links.splice(evt.oldIndex, 1)[0];
          data.categories[toCat].links.splice(evt.newIndex, 0, movedLink);
          
          render();
          await saveToSupabase();
          showToast('🔄 Link movido!', 'success');
        }
      });
    }

    // ===== CRUD =====
    function addCategory() {
      const name = prompt('✨ Nome da nova categoria:');
      if (!name || !name.trim()) return;
      data.categories.push({ name: name.trim(), links: [] });
      render();
      saveToSupabase();
      showToast('📁 Categoria criada!', 'success');
    }

    function addLink(catIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = null;
      document.getElementById('modalTitle').textContent = '➕ Adicionar Link';
      document.getElementById('linkTitle').value = '';
      document.getElementById('linkUrl').value = '';
      document.getElementById('linkTags').value = '';
      document.getElementById('linkCategory').value = catIndex;
      document.getElementById('modal').classList.add('active');
      document.getElementById('linkTitle').focus();
    }

    function editLink(catIndex, linkIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = linkIndex;
      const link = data.categories[catIndex].links[linkIndex];
      document.getElementById('modalTitle').textContent = '✏️ Editar Link';
      document.getElementById('linkTitle').value = link.title || '';
      document.getElementById('linkUrl').value = link.url || '';
      document.getElementById('linkTags').value = link.tags ? link.tags.join(', ') : '';
      document.getElementById('linkCategory').value = catIndex;
      document.getElementById('modal').classList.add('active');
    }

    async function saveLink() {
      const title = document.getElementById('linkTitle').value.trim();
      let url = document.getElementById('linkUrl').value.trim();
      const tagsStr = document.getElementById('linkTags').value.trim();
      const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];

      if (!title || !url) {
        showToast('⚠️ Título e URL obrigatórios!', 'error');
        return;
      }

      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      if (!isValidUrl(url)) {
        showToast('⚠️ URL inválida!', 'error');
        return;
      }

      if (currentLinkIndex === null) {
        data.categories[currentCatIndex].links.push({ title, url, tags });
        showToast('✅ Link adicionado!', 'success');
      } else {
        data.categories[currentCatIndex].links[currentLinkIndex] = { title, url, tags };
        showToast('✅ Link atualizado!', 'success');
      }

      hideModal();
      render();
      await saveToSupabase();
    }

    function deleteLink(catIndex, linkIndex) {
      if (confirm('Excluir este link?')) {
        data.categories[catIndex].links.splice(linkIndex, 1);
        render();
        saveToSupabase();
        showToast('🗑️ Link excluído', 'success');
      }
    }

    function hideModal() {
      document.getElementById('modal').classList.remove('active');
      currentCatIndex = null;
      currentLinkIndex = null;
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') hideModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideModal();
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
    });

    function clearAll() {
      if (confirm('🚨 Apagar TUDO?') && confirm('✅ Confirmar?')) {
        data = { categories: [] };
        render();
        saveToSupabase();
        showToast('🗑️ Tudo limpo', 'success');
      }
    }

    function filterLinks() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      let hasResults = false;

      document.querySelectorAll('.category-card').forEach(card => {
        const title = card.querySelector('.category-title')?.textContent.toLowerCase() || '';
        const items = card.querySelectorAll('.link-item');
        let categoryVisible = title.includes(term);

        items.forEach(item => {
          const text = item.textContent.toLowerCase();
          const match = term === '' || text.includes(term);
          item.style.display = match ? 'flex' : 'none';
          if (match) {
            categoryVisible = true;
            hasResults = true;
          }
        });

        card.style.display = categoryVisible ? 'block' : 'none';
      });

      const emptyState = document.getElementById('emptyState');
      if (term !== '' && !hasResults) {
        emptyState.classList.remove('hidden');
        emptyState.querySelector('p').textContent = '🔍 Nenhum resultado';
      } else if (term === '') {
        emptyState.classList.add('hidden');
      }
    }

    function populateCategorySelect() {
      const select = document.getElementById('linkCategory');
      select.innerHTML = data.categories.map((c, i) => 
        `<option value="${i}">${escapeHtml(c.name)}</option>`
      ).join('');
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `favoritos-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('💾 Backup exportado!', 'success');
    }

    // ===== INICIALIZAÇÃO =====
    window.addEventListener('DOMContentLoaded', () => {
      loadTheme();
      initializeData();
      render();
      setTimeout(() => loadFromSupabase(), 200);
    });
  </script>
</body>
</html>
