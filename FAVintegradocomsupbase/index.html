  <style>
    :root {
      --bg: #0f172a;
      --card: #1e2937;
      --text: #e2e8f0;
      --accent: #60a5fa;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1350px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.8em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid #334155;
    }

    .card h3 {
      margin: 0 0 16px 0;
      color: var(--accent);
      font-size: 1.4em;
      border-bottom: 1px solid #475569;
      padding-bottom: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      color: var(--text);
      text-decoration: none;
      border-radius: 10px;
      transition: 0.2s;
    }

    .link:hover {
      background: #334155;
    }

    .link img {
      width: 22px;
      height: 22px;
      border-radius: 5px;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      opacity: 0.6;
    }
  </style>
</head>

    function getFavicon(url) {
      try {
        const domain = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?sz=32&domain=${domain}`;
      } catch {
        return '';
      }
    }

    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      categories.forEach(category => {
        let html = `<div class="card"><h3>${category.title}</h3>`;

        category.links.forEach(link => {
          html += `
            <a href="${link.url}" target="_blank" class="link">
              <img src="${getFavicon(link.url)}" alt="">
              ${link.name}
            </a>`;
        });

        html += `</div>`;
        grid.innerHTML += html;
      });
    }

    window.onload = renderCards;
