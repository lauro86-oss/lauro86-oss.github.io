<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos Rápidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #0f172a; font-family: system-ui, sans-serif; }
    .card { background-color: #1e2937; border-radius: 16px; }
    .category-title { font-size: 1.25rem; font-weight: 600; }
    .link-item { transition: background 0.2s; }
    .link-item:hover { background-color: #334155; }
  </style>
</head>
<body class="text-zinc-200 min-h-screen pb-12">
  <div class="max-w-6xl mx-auto p-6">

    <!-- Título principal -->
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold flex items-center justify-center gap-3">
        ⭐ Meus Favoritos Rápidos
      </h1>
    </div>

    <!-- Botões de ação -->
    <div class="flex flex-wrap gap-4 justify-center mb-12">
      <button onclick="addCategory()" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl flex items-center gap-2 font-medium">
        <i class="fas fa-plus"></i> Nova Categoria
      </button>
      <button onclick="clearAll()" class="px-6 py-3 bg-red-600 hover:bg-red-500 rounded-2xl flex items-center gap-2">
        🗑️ Limpar Tudo
      </button>
    </div>

    <input id="search" type="text" placeholder="🔎 Buscar..." 
           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 mb-12 text-lg focus:outline-none focus:border-blue-500"
           onkeyup="filterLinks()">

    <div id="categories" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
      <h2 class="text-2xl font-bold mb-6" id="modalTitle">Adicionar Link</h2>
      <input id="linkTitle" placeholder="Título do link" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-4">
      <input id="linkUrl" placeholder="https://..." class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-4">
      <input id="linkTag" placeholder="Tag (opcional)" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-6">
      <div class="flex gap-3">
        <button onclick="hideModal()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Cancelar</button>
        <button onclick="saveLink()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    // Suas chaves
    const SUPABASE_URL = 'https://pdjseeawiwprvdajbvsk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_x6Qj122dzY-CHh1-pOa1rw_JEsMtNux';

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let data = { categories: [] };
    let currentCatIndex = null;
    let currentLinkIndex = null;

    async function loadData() {
      const { data: result, error } = await supabase
        .from('favoritos')
        .select('categories')
        .order('created_at', { ascending: false })
        .limit(1);

      if (error) {
        alert("Erro ao carregar do Supabase. Verifique a tabela.");
        return;
      }

      if (result && result.length > 0 && result[0].categories) {
        data = result[0].categories;
      } else {
        data = { categories: [] };
        await saveToSupabase();
      }
      render();
    }

    async function saveToSupabase() {
      try {
        const { data: existing } = await supabase.from('favoritos').select('id').limit(1);
        if (existing && existing.length > 0) {
          await supabase.from('favoritos').update({ categories: data }).eq('id', existing[0].id);
        } else {
          await supabase.from('favoritos').insert([{ categories: data }]);
        }
      } catch (e) { console.error(e); }
    }

    function render() {
      const container = document.getElementById("categories");
      container.innerHTML = "";

      data.categories.forEach((cat, catIndex) => {
        const card = document.createElement("div");
        card.className = "card p-6 h-full flex flex-col";
        card.innerHTML = `
          <div class="flex items-center justify-between mb-4">
            <h2 class="category-title flex items-center gap-2">
              ${cat.emoji || '📁'} ${cat.name}
            </h2>
            <div class="flex gap-2">
              <button onclick="addLink(${catIndex}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-white text-xl">➕</button>
              <button onclick="deleteCategory(${catIndex}); event.stopImmediatePropagation()" class="text-red-400 hover:text-white text-xl">🗑️</button>
            </div>
          </div>
          <ul id="list-${catIndex}" class="flex-1 space-y-2"></ul>
        `;
        container.appendChild(card);

        const ul = card.querySelector(`#list-${catIndex}`);
        cat.links.forEach((link, linkIndex) => {
          const li = document.createElement("li");
          li.className = "link-item flex items-center justify-between px-4 py-3 rounded-xl group cursor-grab";
          li.innerHTML = `
            <div class="flex-1 min-w-0">
              <a href="${link.url}" target="_blank" class="hover:underline block truncate">${link.title}</a>
              ${link.tag ? `<span class="text-xs text-zinc-500 block">${link.tag}</span>` : ''}
            </div>
            <div class="flex gap-3 opacity-0 group-hover:opacity-100">
              <button onclick="editLink(${catIndex}, ${linkIndex}); event.stopImmediatePropagation()" class="text-amber-400">✏️</button>
              <button onclick="deleteLink(${catIndex}, ${linkIndex}); event.stopImmediatePropagation()" class="text-red-400">🗑️</button>
            </div>
          `;
          ul.appendChild(li);
        });

        // Drag and drop
        new Sortable(ul, {
          group: "links",
          animation: 150,
          onEnd: async (evt) => {
            const from = parseInt(evt.from.id.split('-')[1]);
            const to = parseInt(evt.to.id.split('-')[1]);
            const moved = data.categories[from].links.splice(evt.oldIndex, 1)[0];
            data.categories[to].links.splice(evt.newIndex, 0, moved);
            render();
            await saveToSupabase();
          }
        });
      });
    }

    // Funções CRUD com salvamento automático
    function addCategory() {
      const name = prompt("Nome da nova categoria:");
      if (!name) return;
      const emoji = prompt("Emoji da categoria (ex: 🤖):", "📁");
      data.categories.push({ name: name.trim(), emoji: emoji || "📁", links: [] });
      render();
      saveToSupabase();
    }

    function deleteCategory(index) {
      if (confirm("Excluir esta categoria?")) {
        data.categories.splice(index, 1);
        render();
        saveToSupabase();
      }
    }

    function addLink(catIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = null;
      document.getElementById("modalTitle").textContent = "Novo Link";
      document.getElementById("linkTitle").value = "";
      document.getElementById("linkUrl").value = "";
      document.getElementById("linkTag").value = "";
      document.getElementById("modal").classList.remove("hidden");
    }

    function editLink(catIndex, linkIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = linkIndex;
      const link = data.categories[catIndex].links[linkIndex];
      document.getElementById("modalTitle").textContent = "Editar Link";
      document.getElementById("linkTitle").value = link.title;
      document.getElementById("linkUrl").value = link.url;
      document.getElementById("linkTag").value = link.tag || "";
      document.getElementById("modal").classList.remove("hidden");
    }

    async function saveLink() {
      const title = document.getElementById("linkTitle").value.trim();
      const url = document.getElementById("linkUrl").value.trim();
      const tag = document.getElementById("linkTag").value.trim();

      if (!title || !url) return alert("Título e URL obrigatórios!");

      if (currentLinkIndex === null) {
        data.categories[currentCatIndex].links.push({ title, url, tag });
      } else {
        data.categories[currentCatIndex].links[currentLinkIndex] = { title, url, tag };
      }

      hideModal();
      render();
      await saveToSupabase();
    }

    function deleteLink(catIndex, linkIndex) {
      if (confirm("Excluir este link?")) {
        data.categories[catIndex].links.splice(linkIndex, 1);
        render();
        saveToSupabase();
      }
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function clearAll() {
      if (confirm("Apagar TODOS os favoritos?")) {
        data = { categories: [] };
        render();
        saveToSupabase();
      }
    }

    function filterLinks() {
      const term = document.getElementById("search").value.toLowerCase().trim();
      document.querySelectorAll(".card").forEach(card => {
        const title = card.querySelector(".category-title").textContent.toLowerCase();
        const links = card.querySelectorAll("li");
        let visible = title.includes(term);
        links.forEach(li => {
          if (li.textContent.toLowerCase().includes(term)) {
            li.style.display = "flex";
            visible = true;
          } else {
            li.style.display = "none";
          }
        });
        card.style.display = visible ? "block" : "none";
      });
    }

    window.onload = loadData;
  </script>
</body>
</html>
