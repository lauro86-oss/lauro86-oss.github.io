<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos Rápidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #0f172a; font-family: system-ui, sans-serif; }
    .card { background-color: #1e2937; border-radius: 16px; padding: 20px; }
    .link-item:hover { background-color: #334155; }
    .modal-enter { animation: modalEnter 0.2s ease-out; }
    @keyframes modalEnter {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="text-zinc-200 min-h-screen pb-12">

  <div class="max-w-6xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold flex items-center justify-center gap-3">⭐ Meus Favoritos Rápidos</h1>
    </div>

    <div class="flex flex-wrap gap-4 justify-center mb-10">
      <button onclick="addCategory()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium transition">Nova Categoria</button>
      <button onclick="clearAll()" class="px-8 py-3 bg-red-600 hover:bg-red-500 rounded-2xl font-medium transition">🗑️ Limpar Tudo</button>
    </div>

    <input id="search" type="text" placeholder="🔎 Buscar links ou categorias..." 
           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 mb-12 text-lg focus:outline-none focus:border-blue-500 transition"
           onkeyup="filterLinks()">

    <div id="categories" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    
    <div id="emptyState" class="text-center text-zinc-500 py-20 hidden">
      <p class="text-2xl mb-4">📭 Nenhum favorito ainda</p>
      <p>Clique em "Nova Categoria" para começar!</p>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4 modal-enter border border-zinc-700">
      <h2 class="text-2xl font-bold mb-6" id="modalTitle">Adicionar Link</h2>
      <input id="linkTitle" placeholder="Título do link *" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input id="linkUrl" placeholder="https://exemplo.com *" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input id="linkTag" placeholder="Tag (opcional) - ex: trabalho, pessoal" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <div class="flex gap-3">
        <button onclick="hideModal()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition font-medium">Cancelar</button>
        <button onclick="saveLink()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium transition">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Toast de Notificação -->
  <div id="toast" class="fixed bottom-6 right-6 bg-zinc-800 text-white px-6 py-4 rounded-2xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 border border-zinc-700"></div>

  <script>
    // ===== CONFIGURAÇÃO SUPABASE =====
    const SUPABASE_URL = 'https://pdjseeawiwprvdajbvsk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_x6Qj122dzY-CHh1-pOa1rw_JEsMtNux';

    // ✅ CORREÇÃO #1: Inicialização correta do cliente Supabase
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Estrutura de dados principal
    let data = { categories: [] };
    let currentCatIndex = null;
    let currentLinkIndex = null;

    // ✅ CORREÇÃO #4: Função para prevenir XSS (escapar HTML)
    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    // ✅ CORREÇÃO #5: Validação de URL
    function isValidUrl(string) {
      try {
        const url = new URL(string);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch (_) {
        return false;
      }
    }

    // Sistema de notificações (toast)
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-lg transition-all duration-300 z-50 border ${
        type === 'success' ? 'bg-green-600 border-green-500' :
        type === 'error' ? 'bg-red-600 border-red-500' :
        'bg-zinc-800 border-zinc-700'
      } text-white transform translate-y-0 opacity-100`;
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    // ===== FUNÇÕES DE DADOS =====

    async function loadData() {
      try {
        const { data: result, error } = await supabaseClient
          .from('favoritos')
          .select('categories')
          .limit(1)
          .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        // ✅ CORREÇÃO #2: Mantém estrutura { categories: [...] } correta
        if (result && result.length > 0 && result[0].categories) {
          data = { categories: result[0].categories };
        }
        render();
      } catch (e) {
        console.error("Erro ao carregar do Supabase:", e);
        showToast("⚠️ Usando dados locais (offline)", "info");
        render(); // Renderiza dados locais mesmo se falhar
      }
    }

    async function saveToSupabase() {
      try {
        const { data: existing, error: fetchError } = await supabaseClient
          .from('favoritos')
          .select('id')
          .limit(1);
        
        if (fetchError) throw fetchError;
        
        if (existing && existing.length > 0) {
          const { error: updateError } = await supabaseClient
            .from('favoritos')
            .update({ categories: data.categories }) // ✅ Usa data.categories
            .eq('id', existing[0].id);
          if (updateError) throw updateError;
        } else {
          const { error: insertError } = await supabaseClient
            .from('favoritos')
            .insert([{ categories: data.categories }]); // ✅ Usa data.categories
          if (insertError) throw insertError;
        }
        showToast("✅ Salvo na nuvem!", "success");
      } catch (e) {
        console.error("Erro ao salvar no Supabase:", e);
        showToast("⚠️ Salvo apenas localmente", "error");
        // Salva no localStorage como fallback
        localStorage.setItem('favorites_backup', JSON.stringify(data));
      }
    }

    // ===== RENDERIZAÇÃO =====

    function render() {
      const container = document.getElementById("categories");
      const emptyState = document.getElementById("emptyState");
      container.innerHTML = "";

      // Mostra estado vazio se não houver categorias
      if (!data.categories || data.categories.length === 0) {
        emptyState.classList.remove("hidden");
        return;
      }
      emptyState.classList.add("hidden");

      data.categories.forEach((cat, catIndex) => {
        const card = document.createElement("div");
        card.className = "card hover:shadow-xl transition-shadow duration-300";
        card.innerHTML = `
          <div class="flex justify-between items-center mb-4 cursor-default">
            <h2 class="text-xl font-semibold truncate">${escapeHtml(cat.emoji || '📁')} ${escapeHtml(cat.name)}</h2>
            <div class="flex items-center gap-2">
              <button onclick="event.stopPropagation(); addLink(${catIndex})" class="text-blue-400 hover:text-blue-300 text-xl transition" title="Adicionar link">➕</button>
              <button onclick="event.stopPropagation(); deleteCategory(${catIndex})" class="text-red-400 hover:text-red-300 text-xl transition" title="Excluir categoria">🗑️</button>
            </div>
          </div>
          <ul id="list-${catIndex}" data-cat-index="${catIndex}" class="space-y-1 min-h-[50px]"></ul>
          ${cat.links.length === 0 ? '<p class="text-zinc-500 text-sm text-center py-2">Nenhum link</p>' : ''}
        `;
        container.appendChild(card);

        const ul = card.querySelector(`#list-${catIndex}`);
        
        cat.links.forEach((link, linkIndex) => {
          const li = document.createElement("li");
          li.className = "link-item px-4 py-3 rounded-xl flex justify-between items-center group cursor-grab active:cursor-grabbing transition";
          li.draggable = true;
          // ✅ CORREÇÃO #4: Usa escapeHtml para prevenir XSS
          li.innerHTML = `
            <div class="flex-1 min-w-0">
              <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="hover:underline text-blue-300 font-medium truncate block" title="${escapeHtml(link.title)}">
                ${escapeHtml(link.title)}
              </a>
              ${link.tag ? `<span class="text-xs text-zinc-500">#${escapeHtml(link.tag)}</span>` : ''}
            </div>
            <div class="opacity-0 group-hover:opacity-100 flex gap-2 transition-opacity">
              <button onclick="event.stopPropagation(); editLink(${catIndex}, ${linkIndex})" class="text-amber-400 hover:text-amber-300 transition" title="Editar">✏️</button>
              <button onclick="event.stopPropagation(); deleteLink(${catIndex}, ${linkIndex})" class="text-red-400 hover:text-red-300 transition" title="Excluir">🗑️</button>
            </div>
          `;
          ul.appendChild(li);
        });

        // Inicializa Sortable para drag-and-drop
        new Sortable(ul, {
          group: "shared-links",
          animation: 150,
          ghostClass: "opacity-50",
          dragClass: "bg-zinc-700 rounded-xl",
          onEnd: async (evt) => {
            const fromCatIndex = parseInt(evt.from.dataset.catIndex);
            const toCatIndex = parseInt(evt.to.dataset.catIndex);
            
            // Move o link entre categorias ou dentro da mesma
            const movedLink = data.categories[fromCatIndex].links.splice(evt.oldIndex, 1)[0];
            data.categories[toCatIndex].links.splice(evt.newIndex, 0, movedLink);
            
            render();
            await saveToSupabase();
            showToast("🔄 Link movido!", "success");
          }
        });
      });
    }

    // ===== FUNÇÕES CRUD =====

    function addCategory() {
      const name = prompt("✨ Nome da nova categoria:");
      if (!name || !name.trim()) return;
      
      const emoji = prompt("🎨 Emoji (opcional):", "📁");
      data.categories.push({ 
        name: name.trim(), 
        emoji: emoji?.trim() || "📁", 
        links: [] 
      });
      render();
      saveToSupabase();
      showToast("📁 Categoria criada!", "success");
    }

    function deleteCategory(index) {
      const catName = data.categories[index]?.name;
      if (confirm(`⚠️ Excluir categoria "${catName}" e todos os seus links?`)) {
        data.categories.splice(index, 1);
        render();
        saveToSupabase();
        showToast("🗑️ Categoria excluída", "success");
      }
    }

    function addLink(catIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = null;
      document.getElementById("modalTitle").textContent = "➕ Novo Link";
      document.getElementById("linkTitle").value = "";
      document.getElementById("linkUrl").value = "";
      document.getElementById("linkTag").value = "";
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("linkTitle").focus();
    }

    function editLink(catIndex, linkIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = linkIndex;
      const link = data.categories[catIndex].links[linkIndex];
      document.getElementById("modalTitle").textContent = "✏️ Editar Link";
      document.getElementById("linkTitle").value = link.title || "";
      document.getElementById("linkUrl").value = link.url || "";
      document.getElementById("linkTag").value = link.tag || "";
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("linkTitle").focus();
    }

    // ✅ CORREÇÃO #3 + #5: Validação e escape em saveLink
    async function saveLink() {
      const title = document.getElementById("linkTitle").value.trim();
      let url = document.getElementById("linkUrl").value.trim();
      const tag = document.getElementById("linkTag").value.trim();
      
      if (!title || !url) {
        showToast("⚠️ Título e URL são obrigatórios!", "error");
        return;
      }
      
      // Normaliza URL: adiciona https:// se necessário
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      
      if (!isValidUrl(url)) {
        showToast("⚠️ URL inválida! Ex: https://exemplo.com", "error");
        return;
      }
      
      if (currentLinkIndex === null) {
        // Novo link
        data.categories[currentCatIndex].links.push({ title, url, tag });
        showToast("✅ Link adicionado!", "success");
      } else {
        // Editar link existente
        data.categories[currentCatIndex].links[currentLinkIndex] = { title, url, tag };
        showToast("✅ Link atualizado!", "success");
      }
      
      hideModal();
      render();
      await saveToSupabase();
    }

    function deleteLink(catIndex, linkIndex) {
      const linkTitle = data.categories[catIndex].links[linkIndex]?.title;
      if (confirm(`🗑️ Excluir o link "${linkTitle}"?`)) {
        data.categories[catIndex].links.splice(linkIndex, 1);
        render();
        saveToSupabase();
        showToast("🗑️ Link excluído", "success");
      }
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
      currentCatIndex = null;
      currentLinkIndex = null;
    }

    // Fecha modal ao clicar fora
    document.getElementById("modal").addEventListener("click", (e) => {
      if (e.target.id === "modal") hideModal();
    });

    // Fecha modal com tecla ESC
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") hideModal();
    });

    function clearAll() {
      if (confirm("🚨 ATENÇÃO: Isso apagará TODOS os seus favoritos permanentemente. Continuar?")) {
        if (confirm("✅ Confirmar exclusão total?")) {
          data = { categories: [] };
          render();
          saveToSupabase();
          showToast("🗑️ Todos os dados foram limpos", "success");
        }
      }
    }

    function filterLinks() {
      const term = document.getElementById("search").value.toLowerCase().trim();
      let hasResults = false;
      
      document.querySelectorAll(".card").forEach(card => {
        const title = card.querySelector("h2")?.textContent.toLowerCase() || "";
        const items = card.querySelectorAll(".link-item");
        let categoryVisible = title.includes(term);
        let hasVisibleItems = false;
        
        items.forEach(item => {
          const text = item.textContent.toLowerCase();
          if (term === "" || text.includes(term)) {
            item.style.display = "flex";
            hasVisibleItems = true;
            categoryVisible = true;
          } else {
            item.style.display = "none";
          }
        });
        
        if (categoryVisible) {
          card.style.display = "block";
          hasResults = true;
          // Atualiza contador de links visíveis
          const count = Array.from(items).filter(i => i.style.display !== "none").length;
          const info = card.querySelector("p.text-zinc-500");
          if (info && term !== "") {
            info.textContent = `${count} resultado(s)`;
            info.classList.remove("hidden");
          } else if (info) {
            info.classList.add("hidden");
          }
        } else {
          card.style.display = "none";
        }
      });
      
      // Mostra estado vazio se busca não retornar resultados
      const emptyState = document.getElementById("emptyState");
      if (term !== "" && !hasResults) {
        emptyState.classList.remove("hidden");
        emptyState.querySelector("p.text-2xl").textContent = "🔍 Nenhum resultado";
        emptyState.querySelector("p:last-child").textContent = `Tente buscar por outro termo`;
      } else if (term === "") {
        emptyState.classList.add("hidden");
      }
    }

    // ===== INICIALIZAÇÃO =====
    
    // Carrega backup do localStorage se existir (fallback offline)
    function loadLocalBackup() {
      try {
        const backup = localStorage.getItem('favorites_backup');
        if (backup) {
          const parsed = JSON.parse(backup);
          if (parsed.categories && parsed.categories.length > 0) {
            data = parsed;
            console.log("✅ Dados locais carregados como fallback");
          }
        }
      } catch (e) {
        console.warn("⚠️ Não foi possível carregar backup local:", e);
      }
    }

    // Inicializa aplicação
    window.addEventListener("DOMContentLoaded", () => {
      loadLocalBackup();
      loadData();
      
      // Foco no campo de busca com Ctrl+K ou Cmd+K
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "k") {
          e.preventDefault();
          document.getElementById("search").focus();
        }
      });
    });
  </script>
</body>
</html>
