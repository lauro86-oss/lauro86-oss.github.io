<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos Rápidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    body { background-color: #0f172a; font-family: system-ui, sans-serif; }
    .card { background-color: #1e2937; border-radius: 16px; padding: 20px; }
    .link-item:hover { background-color: #334155; }
  </style>
</head>
<body class="text-zinc-200 min-h-screen pb-12">

  <div class="max-w-6xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold flex items-center justify-center gap-3">
        ⭐ Meus Favoritos Rápidos
      </h1>
    </div>

    <div class="flex flex-wrap gap-4 justify-center mb-10">
      <button onclick="addCategory()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium">Nova Categoria</button>
      <button onclick="clearAll()" class="px-8 py-3 bg-red-600 hover:bg-red-500 rounded-2xl font-medium">🗑️ Limpar Tudo</button>
    </div>

    <input id="search" type="text" placeholder="🔎 Buscar..." 
           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 mb-12 text-lg focus:outline-none focus:border-blue-500"
           onkeyup="filterLinks()">

    <div id="categories" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
      <h2 class="text-2xl font-bold mb-6" id="modalTitle">Adicionar Link</h2>
      <input id="linkTitle" placeholder="Título do link" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-4">
      <input id="linkUrl" placeholder="https://..." class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-4">
      <input id="linkTag" placeholder="Tag (opcional)" class="w-full px-5 py-4 bg-zinc-800 rounded-2xl mb-6">
      <div class="flex gap-3">
        <button onclick="hideModal()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Cancelar</button>
        <button onclick="saveLink()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://pdjseeawiwprvdajbvsk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_x6Qj122dzY-CHh1-pOa1rw_JEsMtNux';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let data = { categories: [] };
    let currentCatIndex = null;
    let currentLinkIndex = null;

    // Seus links reais organizados
    data = {
      categories: [
        { name: "Google & Comunicação", emoji: "📧", links: [
          { title: "Gmail / Google Account", url: "https://accounts.google.com" },
          { title: "WhatsApp Web", url: "https://web.whatsapp.com" },
          { title: "Slack", url: "https://app.slack.com/client/T04MQQC5BFS/C04M3J8JTA8" }
        ]},
        { name: "Armazenamento e Senhas", emoji: "☁️", links: [
          { title: "OneDrive", url: "https://onedrive.live.com" },
          { title: "Google Passwords", url: "https://passwords.google.com" },
          { title: "Feedly", url: "https://feedly.com" }
        ]},
        { name: "Entretenimento & IA", emoji: "🎥", links: [
          { title: "YouTube", url: "https://www.youtube.com" },
          { title: "Twitter / X", url: "https://twitter.com/home" },
          { title: "Twitch Following", url: "https://www.twitch.tv/directory/following" },
          { title: "Grok", url: "https://grok.com" },
          { title: "ChatGPT", url: "https://chat.openai.com" },
          { title: "Gemini", url: "https://gemini.google.com" },
          { title: "Venice AI", url: "https://venice.ai" },
          { title: "Chat Qwen", url: "https://chat.qwen.ai" },
          { title: "Chat Zai", url: "https://chat.z.ai" }
        ]},
        { name: "Trabalho e Cursos", emoji: "💼", links: [
          { title: "Smry.ai", url: "https://www.smry.ai" },
          { title: "Bolha Tools", url: "https://open.bolha.tools" },
          { title: "Estratégia Concursos", url: "https://www.estrategiaconcursos.com.br/app/dashboard/assinaturas" },
          { title: "Hotmart Club", url: "https://hotmart.com/pt-br/club/excelencia-negocios-digitais/products/4254304" }
        ]},
        { name: "Benchmarks e Tech", emoji: "🔧", links: [
          { title: "CPU Benchmark", url: "https://www.cpubenchmark.net/singleCompare.php" },
          { title: "Video Card Benchmark", url: "https://www.videocardbenchmark.net/singleCompare.php" },
          { title: "ImgBB", url: "https://imgbb.com" },
          { title: "Twitter Video Downloader", url: "https://twittervideodownloader.com" }
        ]},
        { name: "Trading e Finanças", emoji: "📈", links: [
          { title: "TradingView - MINDOLQ2025", url: "https://br.tradingview.com/chart/h7SmVyyj/?symbol=ACTIVTRADES%3AMINDOLQ2025" }
        ]},
        { name: "Compras e Farmácia", emoji: "🛒", links: [
          { title: "Drogasil", url: "https://www.drogasil.com.br" },
          { title: "Medical Brasil", url: "https://medical-brasil.catalog.kyte.site" },
          { title: "Paraguay Pharmaceuticals", url: "https://paraguaypharmaceuticals.com" }
        ]},
        { name: "Adulto / Fetish", emoji: "🔞", links: [
          { title: "Acompanhantes Indaiatuba", url: "https://www.photoacompanhantes.com/acompanhantes/indaiatuba" },
          { title: "Coomer - Erikasbulbasaur", url: "https://coomer.st/onlyfans/user/erikasbulbasaur" },
          { title: "Pirataria Explicito", url: "https://pirataria.link/explicito" },
          { title: "Reddit Armpit Fetish", url: "https://old.reddit.com/r/armpitfetish" }
        ]},
        { name: "Outros", emoji: "🔗", links: [
          { title: "Wish List", url: "#" },
          { title: "HLTV", url: "https://www.hltv.org/matches" },
          { title: "AES", url: "#" },
          { title: "News Google", url: "https://news.google.com" },
          { title: "OpenRouter Qwen", url: "https://openrouter.ai/models" }
        ]}
      ]
    };

    async function loadData() {
      const { data: result } = await supabase.from('favoritos').select('categories').limit(1).order('created_at', { ascending: false });
      if (result && result.length > 0 && result[0].categories) data = result[0].categories;
      render();
    }

    async function saveToSupabase() {
      try {
        const { data: existing } = await supabase.from('favoritos').select('id').limit(1);
        if (existing && existing.length > 0) {
          await supabase.from('favoritos').update({ categories: data }).eq('id', existing[0].id);
        } else {
          await supabase.from('favoritos').insert([{ categories: data }]);
        }
      } catch (e) { console.error(e); }
    }

    function render() {
      const container = document.getElementById("categories");
      container.innerHTML = "";

      data.categories.forEach((cat, catIndex) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">${cat.emoji || '📁'} ${cat.name}</h2>
            <div>
              <button onclick="addLink(${catIndex}); event.stopImmediatePropagation()" class="text-blue-400 text-2xl mr-3">➕</button>
              <button onclick="deleteCategory(${catIndex}); event.stopImmediatePropagation()" class="text-red-400 text-2xl">🗑️</button>
            </div>
          </div>
          <ul id="list-${catIndex}" class="space-y-1 min-h-[40px]"></ul>
        `;
        container.appendChild(card);

        const ul = card.querySelector(`#list-${catIndex}`);
        cat.links.forEach((link, linkIndex) => {
          const li = document.createElement("li");
          li.className = "link-item px-4 py-3 rounded-xl flex justify-between items-center group cursor-grab";
          li.innerHTML = `
            <div class="flex-1">
              <a href="${link.url}" target="_blank" class="hover:underline">${link.title}</a>
            </div>
            <div class="opacity-0 group-hover:opacity-100 flex gap-3">
              <button onclick="editLink(${catIndex}, ${linkIndex}); event.stopImmediatePropagation()" class="text-amber-400">✏️</button>
              <button onclick="deleteLink(${catIndex}, ${linkIndex}); event.stopImmediatePropagation()" class="text-red-400">🗑️</button>
            </div>
          `;
          ul.appendChild(li);
        });

        new Sortable(ul, {
          group: "links",
          animation: 150,
          onEnd: async (evt) => {
            const from = parseInt(evt.from.id.split('-')[1]);
            const to = parseInt(evt.to.id.split('-')[1]);
            const moved = data.categories[from].links.splice(evt.oldIndex, 1)[0];
            data.categories[to].links.splice(evt.newIndex, 0, moved);
            render();
            await saveToSupabase();
          }
        });
      });
    }

    // Funções CRUD
    function addCategory() {
      const name = prompt("Nome da nova categoria:");
      if (!name) return;
      const emoji = prompt("Emoji da categoria:", "📁");
      data.categories.push({ name: name.trim(), emoji: emoji || "📁", links: [] });
      render();
      saveToSupabase();
    }

    function deleteCategory(index) {
      if (confirm("Excluir esta categoria e todos os links?")) {
        data.categories.splice(index, 1);
        render();
        saveToSupabase();
      }
    }

    function addLink(catIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = null;
      document.getElementById("modalTitle").textContent = "Novo Link";
      document.getElementById("linkTitle").value = "";
      document.getElementById("linkUrl").value = "";
      document.getElementById("linkTag").value = "";
      document.getElementById("modal").classList.remove("hidden");
    }

    function editLink(catIndex, linkIndex) {
      currentCatIndex = catIndex;
      currentLinkIndex = linkIndex;
      const link = data.categories[catIndex].links[linkIndex];
      document.getElementById("modalTitle").textContent = "Editar Link";
      document.getElementById("linkTitle").value = link.title || "";
      document.getElementById("linkUrl").value = link.url || "";
      document.getElementById("linkTag").value = link.tag || "";
      document.getElementById("modal").classList.remove("hidden");
    }

    async function saveLink() {
      const title = document.getElementById("linkTitle").value.trim();
      const url = document.getElementById("linkUrl").value.trim();
      const tag = document.getElementById("linkTag").value.trim();

      if (!title || !url) return alert("Título e URL são obrigatórios!");

      if (currentLinkIndex === null) {
        data.categories[currentCatIndex].links.push({ title, url, tag });
      } else {
        data.categories[currentCatIndex].links[currentLinkIndex] = { title, url, tag };
      }

      hideModal();
      render();
      await saveToSupabase();
    }

    function deleteLink(catIndex, linkIndex) {
      if (confirm("Excluir este link?")) {
        data.categories[catIndex].links.splice(linkIndex, 1);
        render();
        saveToSupabase();
      }
    }

    function hideModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function clearAll() {
      if (confirm("Apagar TODOS os favoritos permanentemente?")) {
        data = { categories: [] };
        render();
        saveToSupabase();
      }
    }

    function filterLinks() {
      const term = document.getElementById("search").value.toLowerCase().trim();
      document.querySelectorAll(".card").forEach(card => {
        const title = card.querySelector("h2").textContent.toLowerCase();
        const items = card.querySelectorAll(".link-item");
        let visible = title.includes(term);
        items.forEach(item => {
          if (item.textContent.toLowerCase().includes(term)) {
            item.style.display = "flex";
            visible = true;
          } else {
            item.style.display = "none";
          }
        });
        card.style.display = visible ? "block" : "none";
      });
    }

    window.onload = loadData;
  </script>
</body>
</html>
